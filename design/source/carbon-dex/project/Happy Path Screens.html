<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon DEX — Happy Path Screens</title>
  <link rel="stylesheet" href="happy-path/styles.css" />
  <style>
    body { background: #1a1917; }
    .dc-frame .portal { min-height: auto; height: 100%; }
    .ab-shell { width: 100%; height: 100%; display: flex; flex-direction: column; background: #fff; }
    .ab-tag {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: #1a1917;
      color: #b6b2a8;
      font: 500 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .ab-tag .dot { width: 7px; height: 7px; border-radius: 50%; background: #d4a035; }
    .ab-tag .who { color: #f4f1e8; }
    .ab-tag .role { margin-left: auto; color: #8a8780; font-size: 10px; }
    .ab-body { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }
    .narration-card {
      background: #232120; color: #f4f1e8;
      border: 1px solid #3a3833;
      border-left: 3px solid #d4a035;
      border-radius: 10px;
      padding: 18px 22px;
      width: 720px;
      font-family: 'Fraunces', serif;
      font-size: 16px;
      line-height: 1.5;
      font-style: italic;
    }
    .narration-card b {
      font-style: normal; color: #d4a035; font-weight: 500;
      margin-right: 10px; font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; vertical-align: 1px;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="happy-path/state.jsx"></script>
  <script type="text/babel" src="happy-path/public-portal.jsx"></script>
  <script type="text/babel" src="happy-path/regulator-portal.jsx"></script>
  <script type="text/babel" src="happy-path/company-portal.jsx"></script>
  <script type="text/babel" src="happy-path/design-canvas.jsx"></script>

  <script type="text/babel">
    function noop() {}
    function Wrap({ tag, who, role, children }) {
      return (
        <div className="ab-shell">
          <div className="ab-tag">
            <span className="dot" style={{ background: tag === 'public' ? '#d4a035' : tag === 'reg' ? '#2d6e4e' : '#d4a035' }}></span>
            <span className="who">{who}</span>
            <span className="role">{role}</span>
          </div>
          <div className="ab-body">{children}</div>
        </div>
      );
    }

    function Screens() {
      const beats = [0, 1, 2, 3];
      const W = 880;
      const H = 1100;

      return (
        <DesignCanvas title="Carbon DEX — Happy Path"
                      subtitle="Three actors, four beats. Twelve screens for hand-off to Claude Code. Public uses EEA Editorial; Regulator + Company use Editorial Calm. cement-mainz.eth is the sole company protagonist; the second counterparty is inferred via the AMM pool.">

          <DCSection id="narration" title="Narration" subtitle="Beat-by-beat scripts the demo follows. Each row of screens below corresponds to one beat.">
            {NARRATION.map((n, i) => (
              <DCArtboard key={'n' + i} id={'narr-' + i} label={BEAT_LABELS[i]} width={760} height={170}
                          style={{ background: '#1a1917' }}>
                <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, background: '#1a1917' }}>
                  <div className="narration-card">
                    <b>{n.tag}</b>{n.text}
                  </div>
                </div>
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection id="public" title="Public observer" subtitle="EEA Editorial · read-only, no wallet · all reads from on-chain events">
            {beats.map((b) => (
              <DCArtboard key={'pub' + b} id={'pub-' + b} label={BEAT_LABELS[b]} width={W} height={H}>
                <Wrap tag="public" who="ets-public-registry.europa.eu" role="read-only · no wallet">
                  <PublicPortal s={stateAt(b)} />
                </Wrap>
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection id="regulator" title="Regulator console" subtitle="Editorial Calm · supervisory · audit log + scheduled events">
            {beats.map((b) => (
              <DCArtboard key={'reg' + b} id={'reg-' + b} label={BEAT_LABELS[b]} width={W} height={H}>
                <Wrap tag="reg" who="eu-ets-authority.eth" role="supervisory">
                  <RegulatorPortal s={stateAt(b)} onIssue={noop} />
                </Wrap>
              </DCArtboard>
            ))}
          </DCSection>

          <DCSection id="company" title="Company A · cement-mainz.eth" subtitle="Editorial Calm · verified emitter · cement · DE">
            {beats.map((b) => (
              <DCArtboard key={'co' + b} id={'co-' + b} label={BEAT_LABELS[b]} width={W} height={H}>
                <Wrap tag="co" who="cement-mainz.eth" role="verified · cement · DE">
                  <CompanyPortal s={stateAt(b)} onSwap={noop} onRetire={noop} />
                </Wrap>
              </DCArtboard>
            ))}
          </DCSection>

        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Screens />);
  </script>
</body>
</html>
