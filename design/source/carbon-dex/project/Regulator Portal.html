<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Regulator portal — full IA, direction A</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="regulator-screens.css">
<style>
.cheat { background: #f3f1e8; padding: 32px 36px; font-family: 'IBM Plex Sans', sans-serif; color: #1a1917; height: 100%; overflow:auto; }
.cheat h1 { font-family: Fraunces, serif; font-size: 38px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 6px; }
.cheat .deck { font-size: 14px; color: #6b6860; max-width: 720px; line-height: 1.55; margin-bottom: 22px; }
.cheat .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.cheat .card { background: #fff; border: 1px solid #d8d4c8; border-radius: 6px; padding: 18px 20px; }
.cheat .card h3 { font-family: Fraunces, serif; font-size: 18px; font-weight: 500; margin-bottom: 10px; letter-spacing: -0.01em; }
.cheat .card p, .cheat .card li { font-size: 12.5px; color: #4a4740; line-height: 1.6; }
.cheat .card ul { padding-left: 16px; margin: 6px 0; }
.cheat .role { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 100px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.cheat .role.cm { background: #eff6ff; color: #1b4f8a; border: 1px solid #bfdbfe; }
.cheat .role.na { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.cheat .role.mk { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
.cheat .role.co { background: #f9fafb; color: #4a4740; border: 1px solid #e5e7eb; }
.cheat .stack { margin-top: 22px; padding: 16px 20px; background: #1a1917; color: #f3efe5; border-radius: 6px; }
.cheat .stack h3 { font-family: Fraunces, serif; font-size: 16px; font-weight: 500; color: #d4a035; margin-bottom: 6px; }
.cheat .stack p { font-size: 12px; line-height: 1.6; }
.cheat code { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #b91c1c; background: #fef2f2; padding: 1px 5px; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="regulator-portal.jsx"></script>
</body>
</html>
