[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true        # avoids "stack too deep" in DemoLocal's long happy-flow function
optimizer = true
optimizer_runs = 200

# Named RPC endpoints — invoke via `forge script ... --rpc-url sepolia` or --rpc-url anvil
# Substitutes from env vars defined in .env (loaded automatically by forge).
[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"

# Sourcify verification (no API key needed; matches BRIEF §6 + §9 prize stack)
[etherscan]
# Reserved for future Etherscan verification if we ever want both — Sourcify is primary.

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
